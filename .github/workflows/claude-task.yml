name: Claude Task

# Remote-control loop: label an issue "claude-task" (or comment "@claude ...")
# from the GitHub mobile app -> Claude implements it on a branch, opens a PR,
# builds the app, boots an emulator, captures a screenshot via Maestro, and
# posts progress + screenshot back to the issue.

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

env:
  APP_MODULE: sample

jobs:
  # Bridges a "claude-task" label into an @claude mention, since
  # anthropics/claude-code-action triggers on mentions, not labels.
  label-bridge:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'claude-task'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "@claude Please implement this issue. Work on a new branch, open a PR when done, and summarize what changed in a comment."
            });

  claude:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  screenshot:
    if: >
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :${{ env.APP_MODULE }}:assembleDebug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Capture screenshot via Maestro
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            apk_path=$(find ${{ env.APP_MODULE }}/build/outputs/apk/debug -name "*.apk" | head -n1)
            adb install -r "$apk_path"
            "$HOME/.maestro/bin/maestro" test maestro/smoke_launch.yaml
            mkdir -p .maestro-output
            find "$HOME/.maestro/tests" -name "launch.png" -exec cp {} .maestro-output/screenshot.png \;

      - name: Commit screenshot to PR branch
        run: |
          mkdir -p docs/screenshots
          cp .maestro-output/screenshot.png "docs/screenshots/pr-${{ github.event.pull_request.number }}.png"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          git commit -m "Add screenshot for PR #${{ github.event.pull_request.number }}" || echo "no changes to commit"
          git push origin HEAD:${{ github.head_ref }}

      - name: Post progress comment with screenshot
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const rawUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${pr.head.ref}/docs/screenshots/pr-${pr.number}.png`;
            const commentBody = [
              "### Progress update",
              "",
              `**PR:** #${pr.number} (\`${pr.head.ref}\`)`,
              `**Screenshot:**`,
              `![screenshot](${rawUrl})`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: commentBody,
            });

            const issueMatch = (pr.body || "").match(/#(\d+)/);
            if (issueMatch) {
              const issueNumber = parseInt(issueMatch[1], 10);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: commentBody,
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: "claude-task",
              }).catch(() => {});
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ["needs-review"],
              }).catch(() => {});
            }
